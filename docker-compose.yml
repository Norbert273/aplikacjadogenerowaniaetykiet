services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: etykiety
      POSTGRES_PASSWORD: etykiety
      POSTGRES_DB: etykiety
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build: .
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://etykiety:etykiety@db:5432/etykiety
      NEXTAUTH_URL: http://localhost:3000
    env_file:
      - .env
    depends_on:
      - db

volumes:
  postgres_data:
